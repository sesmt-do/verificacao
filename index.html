<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Validação de Certificados</title>
<style>
  body{font-family:Arial;background:#f2f2f2;margin:0;padding:16px}
  .card{background:#fff;max-width:680px;margin:0 auto;padding:18px;border-radius:14px;box-shadow:0 6px 18px rgba(0,0,0,.08)}
  h1{margin:0 0 6px 0}
  .muted{color:#666}
  .box{background:#f8f8f8;border:1px dashed #ccc;border-radius:12px;padding:12px;margin-top:14px}
  code{background:#eee;padding:2px 6px;border-radius:6px}
</style>
</head>
<body>
  <div class="card">
    <h1>Líder Eletrificações e Construções LTDA</h1>
    <div class="muted">CNPJ: 46.973.140/0001-47</div>

    <div class="box">
      <b>Como validar:</b><br>
      Escaneie o QR Code do cartão do colaborador.<br>
      Ou acesse um link de validação, por exemplo:<br><br>
      <code>verificar.html?id=francisco</code>
    </div>

    <div class="muted" style="margin-top:12px;">
      * Este site exibe CPF de forma mascarada por segurança.
    </div>
  </div>
</body>
</html>
